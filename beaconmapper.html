<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>WorldNotes Beacon Mapper</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --pad: 14px; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font: 16px/1.4 -apple-system, system-ui, sans-serif; color: #111; background: #f4f5f7; }
  header { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #e2e4e8;
  padding: var(--pad); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 17px; margin: 0; flex: 1 1 100%; }
  button { font: inherit; border: 0; border-radius: 10px; padding: 12px 16px; background: #1877f2; color: #fff;
  font-weight: 600; cursor: pointer; }
  button.secondary { background: #e4e6eb; color: #111; }
  button:disabled { opacity: .5; }
  .count { font-size: 13px; color: #606770; margin-left: auto; }
  #list { padding: var(--pad); display: grid; gap: 12px; }
  .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.08);
  display: grid; grid-template-columns: 120px 1fr auto; align-items: stretch; }
  .thumb { position: relative; width: 120px; height: 96px; background: #dde1e7 center/cover no-repeat; }
  .thumb .pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-100%); font-size: 22px;
  text-shadow: 0 1px 2px rgba(0,0,0,.5); }
  .meta { padding: 10px 12px; min-width: 0; }
  .meta .name { font-weight: 600; }
  .meta .name.empty { color: #b0b3b8; font-weight: 400; font-style: italic; }
  .meta .uid { font: 12px/1.3 ui-monospace, monospace; color: #606770; word-break: break-all; margin-top: 2px; }
  .meta .ll { font-size: 12px; color: #8a8d91; margin-top: 4px; }
  .del { background: none; color: #e0245e; align-self: center; padding: 12px; }
  .empty-state { text-align: center; color: #8a8d91; padding: 48px 24px; }
  /* modal */
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; z-index: 100;
  align-items: flex-end; }
  #modal.open { display: flex; }
  .sheet { background: #fff; width: 100%; max-height: 92vh; border-radius: 16px 16px 0 0; display: flex;
  flex-direction: column; overflow: hidden; }
  .sheet .head { padding: var(--pad); border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
  .sheet .head h2 { font-size: 16px; margin: 0; flex: 1; }
  .sheet .body { padding: var(--pad); overflow: auto; }
  .scan-row { display: flex; align-items: center; gap: 12px; padding: 14px 10px; border-radius: 10px; cursor: pointer;
  border: 1px solid #eee; margin-bottom: 8px; }
  .scan-row:active { background: #f0f2f5; }
  .scan-row .sig { font-size: 13px; color: #606770; white-space: nowrap; }
  .scan-row .id { font: 12px/1.3 ui-monospace, monospace; word-break: break-all; flex: 1; }
  .bars { display: inline-block; width: 34px; }
  #editmap { height: 300px; border-radius: 12px; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field label { font-size: 13px; color: #606770; }
  .field input { font: inherit; padding: 12px; border: 1px solid #ccd0d5; border-radius: 10px; }
  .row2 { display: flex; gap: 12px; }
  .row2 .field { flex: 1; }
  .hint { font-size: 13px; color: #8a8d91; }
  .banner { background: #fff3cd; color: #664d03; padding: 12px var(--pad); font-size: 14px; }
  #jsonout { width: 100%; height: 160px; font: 12px/1.4 ui-monospace, monospace; padding: 10px;
  border: 1px solid #ccd0d5; border-radius: 10px; margin-top: 12px; display: none; }
</style>
</head>
<body>
<header>
  <h1>WorldNotes Beacon Mapper</h1>
  <button id="add">+ Add beacon</button>
  <button id="show-json" class="secondary">JSON</button>
  <span class="count" id="count">0 beacons</span>
</header>
<div id="unsupported" class="banner" style="display:none">
  This device/browser can't scan Bluetooth. Use <b>Chrome on Android</b>, enable
  <b>chrome://flags → Experimental Web Platform features</b>, and open this page over <b>https</b> (not a file://).
</div>
<div id="list"></div>
<textarea id="jsonout" readonly></textarea>

<div id="modal">
  <div class="sheet">
  <div class="head">
  <h2 id="modal-title">Nearby beacons</h2>
  <button class="secondary" id="close">Close</button>
  </div>
  <div class="body" id="modal-body"></div>
  </div>
</div>

<script>
// ---- config knobs -----------------------------------------------------------
// Venue fallback center (used only if GPS is unavailable). Tune to your building.
const DEFAULT_CENTER = [37.48412, -122.14993];
const THUMB_DELTA = 0.0016;  // thumbnail bbox half-span in degrees (~zoom level)
const EDDYSTONE_SVC = '0000feaa-0000-1000-8000-00805f9b34fb';
const STORE_KEY = 'beacon_mapper_v1';
const IMG = (minLng,minLat,maxLng,maxLat) =>
  'https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export' +
  `?bbox=${minLng},${minLat},${maxLng},${maxLat}&bboxSR=4326&size=300,240&format=png&f=image`;
const ESRI_TILES = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';

// ---- state ------------------------------------------------------------------
let beacons = load();
let currentScan = null;  // active BluetoothLEScan
let discovered = new Map();  // uid -> rssi (this scan session)
let scanRenderPending = false;
let editMap = null, editMarker = null, pending = null; // pending = {uid, lat, lng, alt}

function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(beacons)); }

// ---- Eddystone-UID parsing (the only typo-critical bit) ---------------------
function parseEddystoneUid(dv) {
  if (!dv || dv.byteLength < 18) return null;
  if (dv.getUint8(0) !== 0x00) return null;  // frame type 0x00 = UID
  const hex = (start, len) => {
  let s = '';
  for (let i = 0; i < len; i++) s += dv.getUint8(start + i).toString(16).padStart(2, '0');
  return s;
  };
  return `eddystone-uid:${hex(2, 10)}:${hex(12, 6)}`;   // 10-byte namespace : 6-byte instance
}

// ---- list rendering ---------------------------------------------------------
function thumbUrl(lat, lng) {
  const dLng = THUMB_DELTA / Math.cos(lat * Math.PI / 180);
  return IMG(lng - dLng, lat - THUMB_DELTA, lng + dLng, lat + THUMB_DELTA);
}
function renderList() {
  document.getElementById('count').textContent = `${beacons.length} beacon${beacons.length === 1 ? '' : 's'}`;
  const list = document.getElementById('list');
  if (!beacons.length) {
  list.innerHTML = '<div class="empty-state">No beacons yet.<br>Tap <b>+ Add beacon</b> to scan one.</div>';
  return;
  }
  list.innerHTML = '';
  beacons.forEach((b, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
  <div class="thumb" style="background-image:url('${thumbUrl(b.lat, b.lng)}')"><div class="pin">📍</div></div>
  <div class="meta">
  <div class="name ${b.name ? '' : 'empty'}">${b.name ? esc(b.name) : '(no name)'}</div>
  <div class="uid">${esc(b.uid)}</div>
  <div class="ll">${b.lat.toFixed(6)}, ${b.lng.toFixed(6)} · ${b.alt} m</div>
  </div>
  <button class="del" data-i="${i}">✕</button>`;
  list.appendChild(card);
  });
  list.querySelectorAll('.del').forEach(btn => btn.onclick = () => {
  if (confirm('Remove this beacon?')) { beacons.splice(+btn.dataset.i, 1); save(); renderList(); refreshJson(); }
  });
  refreshJson();
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- scanning ---------------------------------------------------------------
async function openAdd() {
  if (!navigator.bluetooth || !navigator.bluetooth.requestLEScan) {
  document.getElementById('unsupported').style.display = 'block';
  return;
  }
  discovered = new Map();
  showModal('Nearby beacons', '<div class="hint">Scanning… tap the beacon you\'re standing next to (strongest signal is at the top).</div><div id="scanlist"></div>');
  navigator.bluetooth.addEventListener('advertisementreceived', onAdvert);
  try {
  currentScan = await navigator.bluetooth.requestLEScan({ acceptAllAdvertisements: true, keepRepeatedDevices: true });
  } catch (e) {
  document.getElementById('modal-body').innerHTML =
  `<div class="banner">Scan failed: ${esc(e.message)}<br>Check the chrome://flags setting and Bluetooth permission.</div>`;
  }
}
function onAdvert(event) {
  const dv = event.serviceData && event.serviceData.get(EDDYSTONE_SVC);
  const uid = parseEddystoneUid(dv);
  if (!uid) return;
  discovered.set(uid, event.rssi);
  if (!scanRenderPending) { scanRenderPending = true; setTimeout(renderScanList, 400); }
}
function renderScanList() {
  scanRenderPending = false;
  const el = document.getElementById('scanlist');
  if (!el) return;
  const have = new Set(beacons.map(b => b.uid));
  const rows = [...discovered.entries()].filter(([uid]) => !have.has(uid)).sort((a, b) => b[1] - a[1]);
  el.innerHTML = rows.length ? '' : '<div class="hint">No new beacons in range yet…</div>';
  rows.forEach(([uid, rssi]) => {
  const row = document.createElement('div');
  row.className = 'scan-row';
  row.innerHTML = `<span class="bars">${signalBars(rssi)}</span><span class="id">${esc(uid)}</span><span class="sig">${rssi} dBm</span>`;
  row.onclick = () => selectBeacon(uid);
  el.appendChild(row);
  });
}
function signalBars(rssi) { const n = rssi > -55 ? 4 : rssi > -67 ? 3 : rssi > -80 ? 2 : 1; return '▮'.repeat(n) + '▯'.repeat(4 - n); }
function stopScan() {
  navigator.bluetooth && navigator.bluetooth.removeEventListener('advertisementreceived', onAdvert);
  if (currentScan) { try { currentScan.stop(); } catch {} currentScan = null; }
}

// ---- location + name step ---------------------------------------------------
function selectBeacon(uid) {
  stopScan();
  pending = { uid, lat: DEFAULT_CENTER[0], lng: DEFAULT_CENTER[1], alt: 0 };
  showModal('Set location', `
  <div class="hint" style="margin-bottom:8px">Drag the pin (or tap the map) to where the beacon is. Override GPS if it's off.</div>
  <div id="editmap"></div>
  <div class="row2">
  <div class="field"><label>Name (optional)</label><input id="f-name" placeholder="e.g. Hall A / booth 17"></div>
  <div class="field" style="flex:0 0 90px"><label>Alt (m)</label><input id="f-alt" type="number" value="0"></div>
  </div>
  <button id="do-add" style="width:100%">Add beacon</button>`);
  editMap = L.map('editmap');
  L.tileLayer(ESRI_TILES, { maxNativeZoom: 19, maxZoom: 21, attribution: 'Esri' }).addTo(editMap);
  const setView = (lat, lng, z) => {
  pending.lat = lat; pending.lng = lng;
  editMap.setView([lat, lng], z);
  editMarker = L.marker([lat, lng], { draggable: true }).addTo(editMap);
  editMarker.on('dragend', () => { const p = editMarker.getLatLng(); pending.lat = p.lat; pending.lng = p.lng; });
  editMap.on('click', e => { editMarker.setLatLng(e.latlng); pending.lat = e.latlng.lat; pending.lng = e.latlng.lng; });
  };
  navigator.geolocation.getCurrentPosition(
  pos => { if (pos.coords.altitude != null) document.getElementById('f-alt').value = Math.round(pos.coords.altitude); setView(pos.coords.latitude, pos.coords.longitude, 20); },
  () => setView(DEFAULT_CENTER[0], DEFAULT_CENTER[1], 18),
  { enableHighAccuracy: true, timeout: 4000 });
  document.getElementById('do-add').onclick = confirmAdd;
}
function confirmAdd() {
  pending.name = document.getElementById('f-name').value.trim();
  pending.alt = Number(document.getElementById('f-alt').value) || 0;
  beacons.push(pending);
  save();
  closeModal();
  renderList();
}

// ---- output -----------------------------------------------------------------
function buildJson() {
  const out = {};
  for (const b of beacons) out[b.uid] = { lat: b.lat, lng: b.lng, alt: b.alt, name: b.name || '' };
  return JSON.stringify({ beacons: out }, null, 2);
}
function refreshJson() { const t = document.getElementById('jsonout'); if (t.style.display === 'block') t.value = buildJson(); }

// ---- modal plumbing ---------------------------------------------------------
function showModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  stopScan();
  if (editMap) { editMap.remove(); editMap = null; }
  document.getElementById('modal').classList.remove('open');
}

// ---- wiring -----------------------------------------------------------------
document.getElementById('add').onclick = openAdd;
document.getElementById('close').onclick = closeModal;
document.getElementById('show-json').onclick = () => {
  const t = document.getElementById('jsonout');
  const open = t.style.display !== 'block';
  t.style.display = open ? 'block' : 'none';
  if (open) { t.value = buildJson(); t.select(); }
};

// ---- self-check: parser must reproduce the known screenshot beacon ----------
(function selfCheck() {
  const bytes = [0x00, 0x00, 0xe5,0xa4,0xa7,0xe5,0xa4,0x8f,0x31,0x32,0x33,0x34, 0x44,0x58,0x4c,0x29,0x19,0x1a];
  const dv = new DataView(new Uint8Array(bytes).buffer);
  const got = parseEddystoneUid(dv);
  console.assert(got === 'eddystone-uid:e5a4a7e5a48f31323334:44584c29191a', 'parser self-check FAILED:', got);
  console.log('beacon-mapper self-check', got === 'eddystone-uid:e5a4a7e5a48f31323334:44584c29191a' ? 'ok' : 'FAILED');
})();

renderList();
</script>
</body>
</html>
